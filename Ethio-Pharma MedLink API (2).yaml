    Prescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        pharmacy:
          allOf:
          - $ref: '#/components/schemas/Pharmacy'
          readOnly: true
        image_url:
          type: string
          format: uri
          maxLength: 500
        detected_medicines: {}
        status:
          allOf:
          - $ref: '#/components/schemas/PrescriptionStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - image_url
      - pharmacy
      - status
      - user
    PrescriptionStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      type: string
      description: |-
        * `pending` - Pending Approval
        * `approved` - Approved
        * `rejected` - Rejected
    Register:
      type: object
      properties:
        username:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: patient
        phone_number:
          type: string
          maxLength: 20
        pharmacy_id:
          type: string
          format: uuid
      required:
      - email
      - password
      - username
    Reservation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        inventory_item:
          allOf:
          - $ref: '#/components/schemas/Inventory'
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ReservationStatusEnum'
          readOnly: true
        pharmacy:
          type: string
          format: uuid
      required:
      - created_at
      - expires_at
      - id
      - inventory_item
      - pharmacy
      - status
      - user
    ReservationStatusEnum:
      enum:
      - pending
      - fulfilled
      - expired
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `fulfilled` - Fulfilled
        * `expired` - Expired
        * `cancelled` - Cancelled
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_id:
          type: string
          format: uuid
          readOnly: true
        user_name:
          type: string
          readOnly: true
        rating:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        comment:
          type: string
        likes:
          type: integer
          readOnly: true
        medicine:
          type: string
          format: uuid
          nullable: true
        pharmacy:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - comment
      - created_at
      - id
      - likes
      - user_id
      - user_name
    RoleEnum:
      enum:
      - patient
      - pharmacist
      - admin
      type: string
      description: |-
        * `patient` - Patient
        * `pharmacist` - Pharmacist
        * `admin` - Admin
    Sale:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        pharmacy_name:
          type: string
          readOnly: true
        medicine_name:
          type: string
          readOnly: true
        quantity_sold:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - medicine_name
      - pharmacy_name
      - quantity_sold
      - total_price
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - id
      - username
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        language:
          $ref: '#/components/schemas/LanguageEnum'
        pharmacy:
          type: string
          format: uuid
          nullable: true
        phone_number:
          type: string
          nullable: true
          maxLength: 20
      required:
      - id
      - user
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
