components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 100
        icon:
          type: string
          nullable: true
          maxLength: 50
      required:
      - id
      - name
    CustomTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    Inventory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        price:
          type: number
          format: double
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_available:
          type: string
          readOnly: true
        distance:
          type: string
          readOnly: true
        medicine:
          allOf:
          - $ref: '#/components/schemas/Medicine'
          readOnly: true
        medicine_id:
          type: string
          format: uuid
          writeOnly: true
        pharmacy:
          allOf:
          - $ref: '#/components/schemas/Pharmacy'
          readOnly: true
        brand:
          type: string
          nullable: true
          maxLength: 255
        strength:
          type: string
          nullable: true
          maxLength: 50
        route:
          type: string
          nullable: true
          maxLength: 50
        frequency:
          type: string
          nullable: true
          maxLength: 100
        recommended_duration:
          type: string
          nullable: true
          maxLength: 100
        usage_instructions:
          type: string
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        manufacture_date:
          type: string
          format: date
          nullable: true
        batch_number:
          type: string
          nullable: true
          maxLength: 100
      required:
      - distance
      - id
      - is_available
      - medicine
      - medicine_id
      - pharmacy
      - price
    LanguageEnum:
      enum:
      - en
      - am
      type: string
      description: |-
        * `en` - English
        * `am` - Amharic
    Medicine:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        image_url:
