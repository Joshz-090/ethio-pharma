openapi: 3.0.3
info:
  title: Ethio-Pharma MedLink API
  version: 1.0.0
  description: Inventory management and reservation system for Arba Minch pharmacies.
paths:
  /api/ai/ocr/:
    post:
      operationId: ai_ocr_create
      description: |-
        Bridge View for Hanan's OCR Service.
        Accepts an image and returns detected medicine names.
      tags:
      - ai
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/ai/predict/:
    get:
      operationId: ai_predict_retrieve
      description: Bridge View for Hanan's Demand Predictor.
      tags:
      - ai
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/analytics/trending/:
