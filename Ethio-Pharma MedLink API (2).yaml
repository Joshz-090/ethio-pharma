          nullable: true
        requires_prescription:
          type: boolean
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
          readOnly: true
        average_rating:
          type: string
          readOnly: true
      required:
      - average_rating
      - category
      - id
      - name
      - reviews
